<!DOCTYPE html>
<html>
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta property="og:title" content="PAYME FAKE PAYMENT WEBSITE">
        <meta property="og:description" content="PAYME WEBSITE IS A FAKE PAYMENT WEBSITE USED FOR FOR FAKE PAYMENTS RECEIPT OF DIFFERENT BANKS, IT'S FOR PRANK PURPOSES ONLY">
        <meta property="og:image" content="img/payme.png">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/loading.css">
        <link rel="icon" href="img/icon.png" type="image/png">
        <link rel="stylesheet" href="../../../cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <title>
            PAYME WEBSITE IS A FAKE PAYMENT WEBSITE USED FOR FOR FAKE PAYMENTS RECEIPT OF DIFFERENT BANKS, IT'S FOR PRANK PURPOSES ONLY
        </title> 

    </head>

    <body>
        
        <div class="loading-access">
            <div>
                <img class="loading-img" width="100px" src="img/cashapp-load.png">
            </div>
        </div>

        <center>
            <img style="margin-top: 30px;" width="150px" src="img/cashapp.png">
        </center>

        <div class="for-pc">
            <div>
                <b>
                    PLEASE USE A DEVICE WITH AT LEAST 767PX SIZE SCREEN
                </b>
            </div>
        </div>

        <form>

            <div class="label">
                CHOOSE PAYMENT TYPE:
            </div>
            <select class="cashapp-payment-type">

                <option value="completed">
                    COMPLETED
                </option>
                
                <option value="pending">
                    PENDING
                </option>

                <option value="failed">
                    FAILED
                </option>
            </select>

            <div class="label">
                AMOUNT:
            </div>

            <div>
                <input class="cashapp-amount" type="tel" required>
            </div>

            <div class="label">
                RECEIVER NAME:
            </div>

            <div>
                <input class="cashapp-receiver-name" type="text" required>
            </div>

            <div class="label">
                TAG:
            </div>

            <div>
                <input class="cashapp-tag" type="text" placeholder="$tag" required>
            </div>

            <div class="label">
                NARRATION (OPTIONAL):
            </div>

            <div>
                <input class="cashapp-narration" type="text">
            </div>

            <div class="label">
                TIME:
            </div>

            <div>
                <input class="cashapp-time" type="time" required>
            </div>

            <div class="label">
                AM/PM:
            </div>
            <select class="cashapp-ampm">

                <option value="am">
                    Am
                </option>
                
                <option value="pm">
                    Pm
                </option>
            </select>

            <center>
                <button>
                    Generate Receipt
                </button>
            </center>
        </form>

        <script src="js/main.js"></script>
    </body>
</html>
